<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IKFS Download Access</title>
    <link rel="stylesheet" href="paywall.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <p class="eyebrow">IronOrr Karaoke File Software (IKFS)</p>
        <h1>Download Access</h1>
        <p class="subtitle">Sign in to unlock your download link.</p>

        <div class="price" id="priceLabel">Member download access</div>

        <form id="loginForm" class="login-form">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />

          <div class="actions">
            <button id="loginBtn" class="btn primary" type="submit">Sign In</button>
            <button id="logoutBtn" class="btn" type="button">Log Out</button>
          </div>
        </form>

        <div id="status" class="status" aria-live="polite"></div>

        <div id="downloadSection" class="download hidden">
          <p class="download-text">Signed in. Download is now enabled:</p>
          <a id="downloadBtn" class="btn success" href="#" target="_blank" rel="noopener noreferrer">Download IKFS</a>
          <p class="note">Download links use a short-lived token for security.</p>
        </div>

        <div id="adminSection" class="download hidden">
          <p class="download-text">Admin tools:</p>
          <a id="adminBtn" class="btn" href="admin.html">Open Troubleshooting Dashboard</a>
          <p class="note">Visible only for admin login.</p>
        </div>

      </section>
    </main>

    <script src="paywall.config.js"></script>
    <script src="paywall.js"></script>
  </body>
</html>
