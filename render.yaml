services:
  - type: web
    name: ikfs-paywall-api
    runtime: node
    plan: starter
    autoDeploy: true
    rootDir: .
    buildCommand: npm install --ignore-scripts
    startCommand: npm run paywall:server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: ELECTRON_SKIP_BINARY_DOWNLOAD
        value: "1"
      - key: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
        value: "1"
      - key: PORT
        value: "10000"
      - key: TOKEN_TTL_SECONDS
        value: "900"
      - key: PAYWALL_ORIGIN
        value: https://kilby8.github.io
      - key: AUTH_DB_PATH
        value: /tmp/auth.sqlite
      - key: DOWNLOAD_URL
        sync: false
      - key: DOWNLOAD_FILE_PATH
        sync: false
      - key: TOKEN_SECRET
        sync: false
