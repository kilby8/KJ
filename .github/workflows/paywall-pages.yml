name: Deploy Paywall to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare paywall site
        shell: bash
        run: |
          mkdir -p pages
          cp paywall.html pages/index.html
          cp paywall.css pages/paywall.css
          cp paywall.js pages/paywall.js
          cp paywall.config.js pages/paywall.config.js
          cp admin.html pages/admin.html
          cp admin.js pages/admin.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
