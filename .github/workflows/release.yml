name: Publish Electron Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute auto-update version
        shell: pwsh
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $parts = $pkg.version.Split('.')
          $version = "$($parts[0]).$($parts[1]).$env:GITHUB_RUN_NUMBER"
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build frontend
        run: npm run build

      - name: Build and publish Electron release
        shell: pwsh
        run: npx electron-builder --publish always --config.extraMetadata.version=$env:APP_VERSION
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
